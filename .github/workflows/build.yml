name: Build Executables

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  # ── 0. Auto-tag on main/master push ──────────────────────────────────
  auto-tag:
    name: Auto-create version tag on main/master
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.create_tag.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_latest_tag
        run: |
          # Get the latest tag, or default to v0.0.0 if none exist
          LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: calc_version
        run: |
          LATEST="${{ steps.get_latest_tag.outputs.LATEST_TAG }}"
          VERSION=${LATEST#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          PATCH=$((PATCH + 1))

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create and push new tag
        id: create_tag
        run: |
          NEW_TAG="${{ steps.calc_version.outputs.NEW_VERSION }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$NEW_TAG" -m "Auto-release $NEW_TAG"
          git push origin "$NEW_TAG"

          echo "Created and pushed tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

  # ── 1. Build platform-specific packages ───────────────────────────────
  build:
    name: Build C++ runtime (${{ matrix.label }})
    needs: [auto-tag]
    if: always() && (needs.auto-tag.result == 'success' || needs.auto-tag.result == 'skipped')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            bin_path: build/gravity
            compiler_path: build/gravityc
            pkg_name: gravity-linux-x64
          - os: macos-latest
            label: macos-x64
            bin_path: build/gravity
            compiler_path: build/gravityc
            pkg_name: gravity-macos-x64
          - os: windows-latest
            label: windows-x64
            bin_path: build/Release/gravity.exe
            compiler_path: build/Release/gravityc.exe
            pkg_name: gravity-windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test (ctest)
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Smoke test interpreter (POSIX)
        if: runner.os != 'Windows'
        run: ./build/gravity run examples/moon_orbit.gravity | head -n 3

      - name: Smoke test interpreter (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\build\Release\gravity.exe run examples\moon_orbit.gravity | Select-Object -First 3

      - name: Smoke test native compiler (POSIX)
        if: runner.os != 'Windows'
        run: |
          ./build/gravityc examples/moon_orbit.gravity --emit build/moon.generated.cpp --build build/moon_native --run

      - name: Smoke test native compiler (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\build\Release\gravityc.exe examples\moon_orbit.gravity --emit build\moon.generated.cpp --build build\moon_native.exe
          .\build\moon_native.exe

      # ── POSIX: bundle both binaries + examples in a tarball ──────────────
      - name: Package tarball (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          PKG="${{ matrix.pkg_name }}"
          mkdir -p "output/$PKG"
          cp "${{ matrix.bin_path }}"      "output/$PKG/gravity"
          cp "${{ matrix.compiler_path }}" "output/$PKG/gravityc"
          cp -r examples                   "output/$PKG/examples"
          tar -czf "output/${PKG}.tar.gz" -C output "$PKG"

      # ── Windows: bundle both binaries + examples in a ZIP ────────────────
      - name: Package ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "${{ matrix.pkg_name }}"
          New-Item -ItemType Directory -Force -Path "output\$pkg" | Out-Null
          Copy-Item "${{ matrix.bin_path }}"      "output\$pkg\gravity.exe"
          Copy-Item "${{ matrix.compiler_path }}" "output\$pkg\gravityc.exe"
          Copy-Item -Recurse examples             "output\$pkg\examples"
          Compress-Archive -Path "output\$pkg" -DestinationPath "output\${pkg}.zip" -Force

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg_name }}
          path: output/

  # ── 2. Publish GitHub release ─────────────────────────────────────────
  release:
    name: Create release and publish
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gravity-*
          merge-multiple: true

      - name: Generate release notes
        id: release_notes
        run: |
          # Determine tag name
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0-dev-$(date +%Y%m%d)")
          fi

          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG_NAME}$" | tail -n1)

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG_NAME" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log HEAD --pretty=format:"- %s (%h)" --no-merges | head -n 20)
          fi

          cat > release_notes.md << 'EOMD'
          ![Gravity-Lang](https://github.com/user-attachments/assets/b693ef5c-b202-4444-81c8-7d2960018253)

          ## 🪐 Gravity-Lang Release TAG_PLACEHOLDER

          ### 📦 What's New

          CHANGELOG_PLACEHOLDER

          ### 📥 Download

          | Platform | File | Notes |
          |---|---|---|
          | **Linux** | `gravity-linux-x64.tar.gz` | `gravity` interpreter + `gravityc` compiler + examples |
          | **macOS** | `gravity-macos-x64.tar.gz` | `gravity` interpreter + `gravityc` compiler + examples |
          | **Windows** | `gravity-windows-x64.zip` | `gravity.exe` + `gravityc.exe` + examples |

          ### 🚀 Quick Start

          **Linux / macOS:**
          ```bash
          tar -xzf gravity-linux-x64.tar.gz
          cd gravity-linux-x64
          ./gravity run examples/moon_orbit.gravity
          ```

          **Windows:**
          ```powershell
          Expand-Archive gravity-windows-x64.zip .
          cd gravity-windows-x64
          .\gravity.exe run examples\moon_orbit.gravity
          ```

          ### ⚙️ Build from source

          ```bash
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ./build/gravity run examples/solar_system.gravity
          ```

          See the [README](https://github.com/dill-lk/Gravity-Lang#readme) for full documentation.
          EOMD

          VERSION=${TAG_NAME#v}
          sed -i "s/TAG_PLACEHOLDER/$TAG_NAME/g" release_notes.md
          sed -i "s/VERSION/$VERSION/g"          release_notes.md

          python3 - "$CHANGELOG" << 'PYEOF'
          import sys, pathlib
          changelog = sys.argv[1]
          content   = pathlib.Path("release_notes.md").read_text()
          content   = content.replace("CHANGELOG_PLACEHOLDER", changelog or "- Internal improvements")
          pathlib.Path("release_notes.md").write_text(content)
          PYEOF

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md     >> $GITHUB_OUTPUT
          echo "EOF"               >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.TAG_NAME }}
          files: |
            dist/*.tar.gz
            dist/*.zip
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
