name: Contributor Recognition

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  recognize-contributor:
    if: github.event.pull_request.merged == true || github.event.issue.state == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Thank contributor for merged PR
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const prNumber = pr.number;
            const labels = pr.labels.map(l => l.name);

            // Check if this is their first merged PR
            const isFirstTime = labels.includes('first-time-contributor');

            let message = '';
            if (isFirstTime) {
              message = `🎉 Congratulations @${author} on your first merged contribution to Gravity-Lang!

This is a significant milestone, and we're grateful for your contribution. We hope this is the first of many!

🌟 You're now officially part of the Gravity-Lang community. Thank you for helping make this project better!`;
            } else {
              message = `✨ Thank you @${author} for your contribution to Gravity-Lang!

Your work in PR #${prNumber} has been merged and will be part of the next release. We appreciate your continued support! 🚀`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message
            });

      - name: Add contributor label
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login;

            // Count total merged PRs from this author
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              per_page: 100
            });

            const mergedCount = prs.filter(pr =>
              pr.user.login === author && pr.merged_at !== null
            ).length;

            // Add milestone labels
            let milestoneLabel = null;
            if (mergedCount === 1) {
              milestoneLabel = 'contributor-1';
            } else if (mergedCount === 5) {
              milestoneLabel = 'contributor-5';
            } else if (mergedCount === 10) {
              milestoneLabel = 'contributor-10';
            } else if (mergedCount === 25) {
              milestoneLabel = 'contributor-25';
            } else if (mergedCount === 50) {
              milestoneLabel = 'contributor-50';
            }

            if (milestoneLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [milestoneLabel]
              });

              // Add celebratory comment for milestones
              const emoji = mergedCount >= 50 ? '🏆' : mergedCount >= 25 ? '🥇' : mergedCount >= 10 ? '🥈' : mergedCount >= 5 ? '🥉' : '⭐';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `${emoji} **Milestone Achievement!** ${emoji}\n\n@${author} has reached **${mergedCount} merged contributions** to Gravity-Lang! Thank you for your continued dedication to this project! 🎊`
              });

              console.log(`Added milestone label: ${milestoneLabel} for ${mergedCount} contributions`);
            }

      - name: Thank for helpful issue reports
        if: github.event_name == 'issues' && github.event.issue.state == 'closed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const labels = issue.labels.map(l => l.name);

            // Only thank for issues that were actually resolved/helpful
            if (labels.includes('bug') || labels.includes('enhancement') || labels.includes('good first issue')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Thank you @${author} for reporting this issue! Your feedback helps make Gravity-Lang better. 🙏`
              });
            }
